<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMP (Old)</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background-color: #222;
        color: #fff;
        font-family: Arial, sans-serif;
        padding: 16px;
    }

    #player-shell {
        display: none;
        width: min(92vw, 1450px);
        gap: 14px;
        flex-direction: column;
        align-items: stretch;
    }

    #player-sources {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    #player-frame-wrap {
        width: 100%;
        min-height: min(78vh, 900px);
        border-radius: 20px;
        overflow: hidden;
        background: #111;
        box-shadow: 0 16px 50px rgba(0,0,0,.4);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #player-frame-wrap iframe {
        width: 100%;
        height: min(78vh, 900px);
        border: 0;
        background: #111;
    }

    #top-links {
        margin-top: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
    }

    #top-links a {
        color: #fff !important;
        text-decoration: none;
    }

    .hidden {
        display: none !important;
    }

    #header {
        text-align: center;
        margin-bottom: 20px;
    }

    #header h1 {
        font-size: 48px;
        margin: 0;
    }

    #search-container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 640px;
    }

    #search-bar {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        background-color: #333;
        border: none;
        color: #fff;
        margin-bottom: 20px;
        border-radius: 12px;
    }

    #search-button,
    .source-btn {
        padding: 10px 20px;
        font-size: 16px;
        background-color: rgba(255,255,255,.09);
        color: #fff;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 999px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.2s;
        font-weight: 700;
    }

    #search-button:hover,
    .source-btn:hover {
        background-color: #999;
        transform: scale(1.03);
        color: #111;
    }

    .source-btn.active {
        background-color: #fff;
        color: #111;
    }

    #bottom-text {
        margin-top: 20px;
        color: #fff;
    }

    #home-button {
        position: fixed;
        top: 10px;
        left: 10px;
        background-color: #333;
        color: #fff;
        padding: 8px 14px;
        font-size: 14px;
        border-radius: 999px;
        text-decoration: none;
        cursor: pointer;
        z-index: 9999;
    }

    #status {
        margin-top: 12px;
        color: rgba(255,255,255,.7);
        text-align: center;
        max-width: 780px;
        line-height: 1.5;
    }

    #movie-meta {
        text-align: center;
        color: rgba(255,255,255,.78);
        line-height: 1.5;
    }

    @media (max-width: 768px) {
        #header h1 {
            font-size: 28px;
        }

        #top-links {
            gap: 12px;
        }
    }
    </style>
</head>
<body>
    <a href="index.html" id="home-button" class="hidden">Home</a>

    <div id="top-links">
        <a href="https://boosty.to/riderr" target="_blank" class="link">Boosty</a>
        <a href="https://www.patreon.com/MichailPimakhov" target="_blank" class="link">Patreon</a>
        <a href="https://www.paypal.com/donate/?hosted_button_id=QV2Y3VZNQD7L2" target="_blank" class="link">PayPal</a>
        <a href="https://raw.githubusercontent.com/RRRiderrr/rmp/main/tms.user.js" class="link">Install TamperMonkey Script for Kinopoisk and IMDb</a>
    </div>

    <div id="header">
        <h1>Rider's Movie Player</h1>
    </div>

    <div id="search-container">
        <input type="text" id="search-bar" placeholder="Kinopoisk ID / IMDb ID / title / Kinopoisk link / IMDb link / TMDB ID">
        <button id="search-button">Search</button>
        <div id="status">Эта страница теперь ходит напрямую в Kinobox API без старого kinobox.min.js. Можно искать по названию, IMDb ID, Kinopoisk ID, TMDB ID и ссылкам на них.</div>
    </div>

    <div id="player-shell">
        <div id="movie-meta"></div>
        <div id="player-sources"></div>
        <div id="player-frame-wrap"></div>
    </div>

    <div id="bottom-text">Based on Kinobox API</div>

    <script>
    const TMDB_API_KEY = '3b68a0041f64019817b5a6a12fcfc882';
    const TMDB_BASE = 'https://api.themoviedb.org/3';
    const KINOBOX_API = 'https://api.kinobox.tv/api/players';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';

    const searchBar = document.getElementById('search-bar');
    const searchButton = document.getElementById('search-button');
    const playerShell = document.getElementById('player-shell');
    const playerSources = document.getElementById('player-sources');
    const playerFrameWrap = document.getElementById('player-frame-wrap');
    const movieMeta = document.getElementById('movie-meta');
    const header = document.getElementById('header');
    const links = document.querySelectorAll('.link');
    const topLinks = document.getElementById('top-links');
    const bottomText = document.getElementById('bottom-text');
    const homeButton = document.getElementById('home-button');
    const statusEl = document.getElementById('status');

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function hideLinks() {
        for (const link of links) {
            link.classList.add('hidden');
        }
    }

    function parseSearchInput(input) {
        const value = String(input || '').trim();
        if (!value) return null;

        const imdbMatch = value.match(/tt\d+/i);
        if (imdbMatch) {
            return { imdb: imdbMatch[0].toLowerCase(), title: imdbMatch[0].toLowerCase() };
        }

        const tmdbMatch = value.match(/(?:tmdb=|tmdb\.org\/(?:movie|tv)\/|#tm)(\d{2,})/i);
        if (tmdbMatch) {
            return { tmdb: tmdbMatch[1], title: value };
        }
        if (/^tm\d{2,}$/i.test(value)) {
            return { tmdb: value.slice(2), title: value };
        }

        const kpMatch = value.match(/(?:kinopoisk\.ru\/(?:film|series)\/|kp=|kinopoisk=)?(\d{3,})/i);
        if (/^\d{3,}$/.test(value)) {
            return { kinopoisk: value, title: value };
        }
        if (kpMatch && /kinopoisk\.ru|kp=|kinopoisk=/.test(value)) {
            return { kinopoisk: kpMatch[1], title: value };
        }

        return { title: value };
    }

    async function enrichByTmdbSearch(payload) {
        if (payload.tmdb) {
            try {
                const detailsRes = await fetch(`${TMDB_BASE}/movie/${payload.tmdb}?api_key=${TMDB_API_KEY}&language=ru-RU`);
                if (detailsRes.ok) {
                    const details = await detailsRes.json();
                    payload.title = details.title || details.original_title || payload.title || payload.tmdb;
                    payload.originalTitle = details.original_title || '';
                    payload.year = details.release_date ? String(details.release_date).slice(0, 4) : '';
                    payload.poster = details.poster_path ? IMG_URL + details.poster_path : '';
                }
            } catch (e) {
                console.error('[enrichByTmdbSearch]', e);
            }
            return payload;
        }

        if (payload.imdb) {
            try {
                const findRes = await fetch(`${TMDB_BASE}/find/${payload.imdb}?api_key=${TMDB_API_KEY}&language=ru-RU&external_source=imdb_id`);
                if (findRes.ok) {
                    const data = await findRes.json();
                    const movie = data && data.movie_results && data.movie_results[0] ? data.movie_results[0] : null;
                    if (movie) {
                        payload.tmdb = String(movie.id || '');
                        payload.title = movie.title || movie.original_title || payload.title || payload.imdb;
                        payload.originalTitle = movie.original_title || '';
                        payload.year = movie.release_date ? String(movie.release_date).slice(0, 4) : '';
                        payload.poster = movie.poster_path ? IMG_URL + movie.poster_path : '';
                    }
                }
            } catch (e) {
                console.error('[enrichByTmdbSearch imdb]', e);
            }
            return payload;
        }

        if (payload.title && !payload.kinopoisk) {
            try {
                const searchRes = await fetch(`${TMDB_BASE}/search/movie?api_key=${TMDB_API_KEY}&language=ru-RU&query=${encodeURIComponent(payload.title)}`);
                if (searchRes.ok) {
                    const data = await searchRes.json();
                    const movie = data && data.results && data.results[0] ? data.results[0] : null;
                    if (movie) {
                        payload.tmdb = String(movie.id || '');
                        payload.title = movie.title || movie.original_title || payload.title;
                        payload.originalTitle = movie.original_title || '';
                        payload.year = movie.release_date ? String(movie.release_date).slice(0, 4) : '';
                        payload.poster = movie.poster_path ? IMG_URL + movie.poster_path : '';
                    }
                }
            } catch (e) {
                console.error('[enrichByTmdbSearch title]', e);
            }
        }

        return payload;
    }

    function renderPlayerMode(meta, sourceText) {
        playerShell.style.display = 'flex';
        searchBar.style.display = 'none';
        searchButton.style.display = 'none';
        header.classList.add('hidden');
        topLinks.classList.add('hidden');
        hideLinks();
        bottomText.classList.add('hidden');
        homeButton.classList.remove('hidden');

        const metaBits = [
            meta.year,
            meta.imdb ? `IMDb: ${escapeHtml(meta.imdb)}` : '',
            meta.kinopoisk ? `KP: ${escapeHtml(meta.kinopoisk)}` : '',
            meta.tmdb ? `TMDB: ${escapeHtml(meta.tmdb)}` : ''
        ].filter(Boolean).join(' • ');

        movieMeta.innerHTML = `
            <div style="font-size:28px;font-weight:700;margin-bottom:6px;">${escapeHtml(meta.title || meta.originalTitle || meta.imdb || meta.kinopoisk || meta.tmdb || 'RMP')}</div>
            <div style="font-size:14px;color:rgba(255,255,255,.65);">${metaBits || 'Подбираем доступные источники...'}</div>
        `;

        statusEl.textContent = sourceText || 'Подбираем рабочий источник...';
        document.title = meta.title || meta.imdb || meta.kinopoisk || meta.tmdb || 'RMP (Old)';
    }

    async function fetchKinoboxSources(movieData) {
        const apiURL = new URL(KINOBOX_API);
        ['imdb', 'tmdb', 'kinopoisk', 'title'].forEach((key) => {
            if (movieData[key]) {
                apiURL.searchParams.set(key, movieData[key]);
            }
        });

        const response = await fetch(apiURL.toString(), { method: 'GET' });
        if (!response.ok || response.status !== 200) {
            throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        if (typeof data !== 'object' || data === null || !Array.isArray(data.data)) {
            throw new Error('Invalid Kinobox response');
        }

        let players = data.data.filter((player) => player && player.iframeUrl && player.type);
        const turboIndex = players.findIndex((player) => String(player.type).toLowerCase() === 'turbo');
        if (turboIndex !== -1) {
            players.push(players.splice(turboIndex, 1)[0]);
        }

        return players;
    }

    function setPlaceholder(message) {
        playerFrameWrap.innerHTML = `<div style="padding:24px;text-align:center;color:rgba(255,255,255,.75);font-size:18px;line-height:1.6;max-width:760px;">${escapeHtml(message)}</div>`;
    }

    function selectSource(sourceData) {
        const iframe = document.createElement('iframe');
        iframe.src = sourceData.iframeUrl;
        iframe.allowFullscreen = true;
        iframe.referrerPolicy = 'origin';
        playerFrameWrap.innerHTML = '';
        playerFrameWrap.appendChild(iframe);
        statusEl.textContent = `Источник: ${sourceData.type}. Если плеер пустой, попробуй другой источник или включи VPN.`;
    }

    function renderSources(sourcesData) {
        playerSources.innerHTML = '';
        const preferredSource = localStorage.getItem('preferred-source');
        let preferredSourceIndex = sourcesData.findIndex((source) => source.type === preferredSource);
        if (preferredSourceIndex === -1) preferredSourceIndex = 0;

        sourcesData.forEach((source, index) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'source-btn' + (index === preferredSourceIndex ? ' active' : '');
            button.textContent = source.type;
            button.addEventListener('click', () => {
                playerSources.querySelectorAll('.source-btn').forEach((el) => el.classList.remove('active'));
                button.classList.add('active');
                localStorage.setItem('preferred-source', source.type);
                selectSource(source);
            });
            playerSources.appendChild(button);
        });

        selectSource(sourcesData[preferredSourceIndex]);
    }

    async function performSearch(rawQuery) {
        const parsed = parseSearchInput(rawQuery);
        if (!parsed) return;

        let sourceText = 'Поиск по названию';
        if (parsed.imdb) sourceText = 'Поиск по IMDb ID: ' + parsed.imdb;
        if (parsed.kinopoisk) sourceText = 'Поиск по Kinopoisk ID: ' + parsed.kinopoisk;
        if (parsed.tmdb) sourceText = 'Поиск по TMDB ID: ' + parsed.tmdb;
        if (parsed.title && !parsed.imdb && !parsed.kinopoisk && !parsed.tmdb) sourceText = 'Поиск по названию: ' + parsed.title;

        setPlaceholder('Подбираем доступные источники...');
        playerSources.innerHTML = '';

        try {
            const payload = await enrichByTmdbSearch(parsed);
            renderPlayerMode(payload, sourceText);
            const sources = await fetchKinoboxSources(payload);
            if (!sources.length) {
                setPlaceholder('Источники не найдены. Попробуй другой запрос, позже повтори попытку или проверь доступность сервиса через VPN.');
                statusEl.textContent = 'Kinobox API ответил, но источники для этого запроса не нашлись.';
                return;
            }
            renderSources(sources);
        } catch (err) {
            console.error(err);
            renderPlayerMode(parsed, sourceText);
            setPlaceholder('Не удалось получить данные от Kinobox API. Проверь доступность сервиса из твоей сети и попробуй включить VPN.');
            statusEl.textContent = `Ошибка загрузки источников: ${err.message}`;
        }
    }

    searchButton.addEventListener('click', () => {
        const query = searchBar.value.trim();
        if (!query) return;
        performSearch(query);
    });

    searchBar.addEventListener('keyup', (event) => {
        if (event.key === 'Enter') {
            const query = searchBar.value.trim();
            if (!query) return;
            performSearch(query);
        }
    });

    window.addEventListener('load', () => {
        const hash = window.location.hash.substr(1);
        const searchParam = new URLSearchParams(window.location.search).get('search');
        const query = hash || searchParam;
        if (query) {
            searchBar.value = query;
            performSearch(query);
        }
    });

    homeButton.addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    document.addEventListener('DOMContentLoaded', function() {
        const canvas = document.createElement('canvas');
        canvas.id = 'popcornCanvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '9999';
        document.body.appendChild(canvas);

        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const popcornImages = ['popcorn.png', 'popcorn2.png', 'popcorn3.png', 'popcorn4.png', 'popcorn5.png'];
        const popcornParticles = [];

        function spawnPopcorn(amount) {
            for (let i = 0; i < amount; i++) {
                const randomImage = popcornImages[Math.floor(Math.random() * popcornImages.length)];
                const popcorn = {
                    x: Math.random() * canvas.width,
                    y: canvas.height,
                    size: Math.floor(Math.random() * 41) + 40,
                    image: new Image()
                };
                popcorn.image.src = randomImage;
                popcorn.velocity = {
                    x: (Math.random() - 0.5) * 5,
                    y: -(Math.random() * 8 + 5)
                };
                popcornParticles.push(popcorn);
            }
        }

        function animatePopcorn() {
            requestAnimationFrame(animatePopcorn);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < popcornParticles.length; i++) {
                const pc = popcornParticles[i];
                pc.velocity.y += 0.2;
                pc.x += pc.velocity.x;
                pc.y += pc.velocity.y;
                ctx.drawImage(pc.image, pc.x, pc.y, pc.size, pc.size);
                if (pc.y > canvas.height + pc.size) {
                    popcornParticles.splice(i, 1);
                    i--;
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['p', 'з'].includes(e.key.toLowerCase())) {
                spawnPopcorn(50);
            }
        });

        animatePopcorn();
    });
    </script>
</body>
</html>
