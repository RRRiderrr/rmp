<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMP (Old)</title>
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background-color: #222;
        color: #fff;
        font-family: Arial, sans-serif;
        padding: 16px;
    }

    .kinobox_player {
        display: none;
        width: min(88vw, 1400px);
        min-height: min(78vh, 900px);
        border-radius: 20px;
        overflow: hidden;
        background: #111;
        box-shadow: 0 16px 50px rgba(0,0,0,.4);
    }

    #top-links {
        margin-top: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
    }

    #top-links a {
        color: #fff !important;
        text-decoration: none;
    }

    .hidden {
        display: none !important;
    }

    #header {
        text-align: center;
        margin-bottom: 20px;
    }

    #header h1 {
        font-size: 48px;
        margin: 0;
    }

    #search-container {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 560px;
    }

    #search-bar {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        background-color: #333;
        border: none;
        color: #fff;
        margin-bottom: 20px;
        border-radius: 12px;
    }

    #search-button {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #333;
        color: #fff;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.2s;
    }

    #search-button:hover {
        background-color: #999;
        transform: scale(1.05);
    }

    #bottom-text {
        margin-top: 20px;
        color: #fff;
    }

    #home-button {
        position: fixed;
        top: 10px;
        left: 10px;
        background-color: #333;
        color: #fff;
        padding: 8px 14px;
        font-size: 14px;
        border-radius: 999px;
        text-decoration: none;
        cursor: pointer;
        z-index: 9999;
    }

    #status {
        margin-top: 12px;
        color: rgba(255,255,255,.7);
        text-align: center;
        max-width: 720px;
        line-height: 1.5;
    }

    @media (max-width: 768px) {
        #header h1 {
            font-size: 28px;
        }

        #top-links {
            gap: 12px;
        }
    }
    </style>
</head>
<body>
    <a href="index.html" id="home-button" class="hidden">Home</a>

    <div id="top-links">
        <a href="https://boosty.to/riderr" target="_blank" class="link">Boosty</a>
        <a href="https://www.patreon.com/MichailPimakhov" target="_blank" class="link">Patreon</a>
        <a href="https://www.paypal.com/donate/?hosted_button_id=QV2Y3VZNQD7L2" target="_blank" class="link">PayPal</a>
        <a href="https://raw.githubusercontent.com/RRRiderrr/rmp/main/tms.user.js" class="link">Install TamperMonkey Script for Kinopoisk and IMDb</a>
    </div>

    <div id="header">
        <h1>Rider's Movie Player</h1>
    </div>

    <div id="search-container">
        <input type="text" id="search-bar" placeholder="Kinopoisk ID / IMDb ID / title / Kinopoisk link / IMDb link">
        <button id="search-button">Search</button>
        <div id="status">Старая страница теперь тоже работает без серверной части: можно искать по названию, IMDb ID, Kinopoisk ID и ссылкам на них.</div>
    </div>

    <div class="kinobox_player"></div>
    <div id="bottom-text">Based on KinoBox</div>

    <script src="https://kinobox.tv/kinobox.min.js"></script>
    <script>
    const searchBar = document.getElementById('search-bar');
    const searchButton = document.getElementById('search-button');
    const kinoboxPlayer = document.querySelector('.kinobox_player');
    const header = document.getElementById('header');
    const links = document.querySelectorAll('.link');
    const bottomText = document.getElementById('bottom-text');
    const homeButton = document.getElementById('home-button');
    const statusEl = document.getElementById('status');

    function hideLinks() {
        for (const link of links) {
            link.classList.add('hidden');
        }
    }

    function parseSearchInput(input) {
        const value = String(input || '').trim();
        if (!value) return null;

        const imdbMatch = value.match(/tt\d+/i);
        if (imdbMatch) {
            return { imdb: imdbMatch[0].toLowerCase() };
        }

        const kpMatch = value.match(/(?:kinopoisk\.ru\/(?:film|series)\/|kp=|kinopoisk=)?(\d{3,})/i);
        if (/^\d{3,}$/.test(value)) {
            return { kinopoisk: value };
        }
        if (kpMatch && /kinopoisk\.ru|kp=|kinopoisk=/.test(value)) {
            return { kinopoisk: kpMatch[1] };
        }

        return { title: value };
    }

    function renderPlayerMode(meta, sourceText) {
        kinoboxPlayer.style.display = 'block';
        searchBar.style.display = 'none';
        searchButton.style.display = 'none';
        header.classList.add('hidden');
        hideLinks();
        bottomText.classList.add('hidden');
        homeButton.classList.remove('hidden');
        statusEl.textContent = sourceText || 'Подбираем рабочий источник...';
        document.title = meta.title || meta.imdb || meta.kinopoisk || 'RMP (Old)';
    }

    function initPlayer(searchPayload) {
        if (typeof window.Kinobox === 'function') {
            new window.Kinobox('.kinobox_player', { search: searchPayload }).init();
            return;
        }
        if (typeof window.kbox === 'function') {
            window.kbox('.kinobox_player', { search: searchPayload });
            return;
        }
        throw new Error('Kinobox script was not loaded');
    }

    function performSearch(rawQuery) {
        const parsed = parseSearchInput(rawQuery);
        if (!parsed) return;

        let sourceText = 'Поиск по названию';
        if (parsed.imdb) sourceText = 'Поиск по IMDb ID: ' + parsed.imdb;
        if (parsed.kinopoisk) sourceText = 'Поиск по Kinopoisk ID: ' + parsed.kinopoisk;
        if (parsed.title) sourceText = 'Поиск по названию: ' + parsed.title;

        renderPlayerMode(parsed, sourceText);

        try {
            initPlayer(parsed);
        } catch (err) {
            console.error(err);
            statusEl.textContent = 'Не удалось запустить Kinobox. Проверь доступность kinobox.tv и перезагрузи страницу.';
        }
    }

    searchButton.addEventListener('click', () => {
        const query = searchBar.value.trim();
        if (!query) return;
        performSearch(query);
    });

    searchBar.addEventListener('keyup', (event) => {
        if (event.key === 'Enter') {
            const query = searchBar.value.trim();
            if (!query) return;
            performSearch(query);
        }
    });

    window.addEventListener('load', () => {
        const hash = window.location.hash.substr(1);
        const searchParam = new URLSearchParams(window.location.search).get('search');
        const query = hash || searchParam;
        if (query) {
            searchBar.value = query;
            performSearch(query);
        }
    });

    homeButton.addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    document.addEventListener('DOMContentLoaded', function() {
        const canvas = document.createElement('canvas');
        canvas.id = 'popcornCanvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '9999';
        document.body.appendChild(canvas);

        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const popcornImages = ['popcorn.png', 'popcorn2.png', 'popcorn3.png', 'popcorn4.png', 'popcorn5.png'];
        const popcornParticles = [];

        function spawnPopcorn(amount) {
            for (let i = 0; i < amount; i++) {
                const randomImage = popcornImages[Math.floor(Math.random() * popcornImages.length)];
                const popcorn = {
                    x: Math.random() * canvas.width,
                    y: canvas.height,
                    size: Math.floor(Math.random() * 41) + 40,
                    image: new Image()
                };
                popcorn.image.src = randomImage;
                popcorn.velocity = {
                    x: (Math.random() - 0.5) * 5,
                    y: -(Math.random() * 8 + 5)
                };
                popcornParticles.push(popcorn);
            }
        }

        function animatePopcorn() {
            requestAnimationFrame(animatePopcorn);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < popcornParticles.length; i++) {
                const pc = popcornParticles[i];
                pc.velocity.y += 0.2;
                pc.x += pc.velocity.x;
                pc.y += pc.velocity.y;
                ctx.drawImage(pc.image, pc.x, pc.y, pc.size, pc.size);
                if (pc.y > canvas.height + pc.size) {
                    popcornParticles.splice(i, 1);
                    i--;
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (['p', 'з'].includes(e.key.toLowerCase())) {
                spawnPopcorn(50);
            }
        });

        animatePopcorn();
    });
    </script>
</body>
</html>
